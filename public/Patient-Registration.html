<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediBridge - Patient Registration</title>
  <style>
    :root {
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --secondary: #64748b;
        --light-gray: #e2e8f0;
        --dark: #1e293b;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .register-box {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        padding: 30px 45px 30px 30px;
        width: 100%;
        max-width: 500px;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: var(--primary);
        font-size: 1.8rem;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: var(--dark);
    }

    input, select, textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--light-gray);
        border-radius: 8px;
        font-size: 1rem;
        transition: border-color 0.3s;
    }

    textarea {
        resize: none;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--primary);
    }

    .btn {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn:hover {
        background: var(--primary-dark);
    }

    .error-message {
        color: #dc2626;
        font-size: 0.875rem;
        margin-top: 4px;
        display: none;
    }

    .extra-links {
        margin-top: 20px;
        text-align: center;
        font-size: 0.9rem;
    }

    .extra-links a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
    }

    .extra-links a:hover {
        text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="register-box">
    <h2>Patient Registration</h2>
    <form id="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>

      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" id="dob" required>
        <small id="ageDisplay" style="color:#444;font-size:12px;"></small>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select id="gender" required>
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Country Code</label>
        <select id="countryCode" required>
          <option value="+91">🇮🇳 +91 (India)</option>
          <option value="+1">🇺🇸 +1 (USA)</option>
          <option value="+44">🇬🇧 +44 (UK)</option>
          <option value="+61">🇦🇺 +61 (Australia)</option>
          <option value="+81">🇯🇵 +81 (Japan)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Contact Number</label>
        <input type="text" id="contact" maxlength="10" required>
      </div>

      <div class="form-group">
        <label>Address</label>
        <textarea id="address" rows="3" required></textarea>
      </div>

      <button type="submit" class="btn">Register</button>
    </form>

    <div class="extra-links">
      <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>

  <script>
    const dobInput = document.getElementById("dob");
    const ageDisplay = document.getElementById("ageDisplay");
    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");

    // Set max date to today
    const today = new Date();
    dobInput.max = today.toISOString().split('T')[0];

    function validateName(name) {
        return /^[A-Za-z\s]+$/.test(name);
    }

    function validateEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function calculateAge(birthDate) {
        const today = new Date();
        const dob = new Date(birthDate);
        let age = today.getFullYear() - dob.getFullYear();
        const monthDiff = today.getMonth() - dob.getMonth();
        
        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) {
            age--;
        }
        return age;
    }

    dobInput.addEventListener("change", () => {
        const dob = new Date(dobInput.value);
        if (!isNaN(dob)) {
            const age = calculateAge(dob);
            if (age <= 0) {
                alert("Invalid date of birth! Age cannot be 0 or negative.");
                dobInput.value = "";
                ageDisplay.textContent = "";
                return;
            }
            ageDisplay.textContent = `Age: ${age} years`;
        }
    });

    nameInput.addEventListener("input", () => {
        const name = nameInput.value.trim();
        if (name && !validateName(name)) {
            alert("Name should only contain letters and spaces!");
            nameInput.value = name.replace(/[^A-Za-z\s]/g, '');
        }
    });

    nameInput.addEventListener("blur", () => {
        const name = nameInput.value.trim();
        if (name && !validateName(name)) {
            alert("Please enter a valid name (letters and spaces only)");
            nameInput.focus();
        }
    });

    document.getElementById("registerForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const dob = document.getElementById("dob").value;
        const gender = document.getElementById("gender").value;
        const countryCode = document.getElementById("countryCode").value;
        const contact = document.getElementById("contact").value.trim();
        const address = document.getElementById("address").value.trim();

        // Validate name
        if (!validateName(name)) {
            alert("Name should only contain letters and spaces!");
            return;
        }

        // Validate email
        if (!validateEmail(email)) {
            alert("Please enter a valid email address!");
            return;
        }

        // Validate DOB
        const age = calculateAge(dob);
        if (age <= 0) {
            alert("Invalid date of birth!");
            return;
        }

        // Validate password
        if (password.length < 6) {
            alert("Password must be at least 6 characters long!");
            return;
        }

        if (password === name || password === contact) {
            alert("Password cannot be same as Name or Contact Number!");
            return;
        }

        // Validate contact number
        if (countryCode === "+91") {
            if (!/^[6-9]\d{9}$/.test(contact)) {
                alert("Indian numbers must start from 6-9 and be 10 digits.");
                return;
            }
        } else if (!/^\d{6,15}$/.test(contact)) {
            alert("Contact number must be between 6 and 15 digits.");
            return;
        }

        // Send data to backend
        fetch("http://localhost:5000/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name,
                email,
                password,
                dob,
                gender,
                phone: countryCode + contact,
                address,
                role: "patient"
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                alert("Error: " + data.error);
            } else {
                alert("Registration successful! Please login.");
                window.location.href = "login.html";
            }
        })
        .catch(err => {
            console.error("Error:", err);
            alert("Something went wrong. Please try again.");
        });
    });
  </script>
</body>

</html>
