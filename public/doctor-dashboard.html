<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBook - Doctor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa;
        }
        .appointment-card {
            transition: transform 0.3s;
            margin-bottom: 1rem;
        }
        .appointment-card:hover {
            transform: translateY(-5px);
        }
        .status-pending { border-left: 4px solid #ffc107; }
        .status-confirmed { border-left: 4px solid #198754; }
        .status-cancelled { border-left: 4px solid #dc3545; }
        .status-completed { border-left: 4px solid #0d6efd; }
        .nav-pills .nav-link.active { background-color: #0d6efd; }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-hospital"></i> MediBook</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="doctor-dashboard.html">
                            <i class="fas fa-calendar"></i> Appointments
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="doctor-schedule.html">
                            <i class="fas fa-clock"></i> Schedule
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-4">
        <h2 class="mb-4"><i class="fas fa-calendar-alt"></i> Appointments Dashboard</h2>

        <ul class="nav nav-pills mb-4" id="appointmentTabs">
            <li class="nav-item">
                <a class="nav-link active" data-status="Pending">
                    <i class="fas fa-clock"></i> Pending
                    <span class="badge bg-secondary" id="pendingCount">0</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-status="Confirmed">
                    <i class="fas fa-check"></i> Confirmed
                    <span class="badge bg-secondary" id="confirmedCount">0</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-status="Completed">
                    <i class="fas fa-check-double"></i> Completed
                    <span class="badge bg-secondary" id="completedCount">0</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-status="Cancelled">
                    <i class="fas fa-times"></i> Cancelled
                    <span class="badge bg-secondary" id="cancelledCount">0</span>
                </a>
            </li>
        </ul>

        <div id="appointmentsContainer" class="row">
            <!-- Appointments will be loaded here -->
        </div>
    </div>

    <!-- Patient Info Modal -->
    <div class="modal fade" id="patientInfoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Patient Information</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="patientInfo"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

<script src="js/sessionManager.js"></script>
<script>
    const API_URL = "http://localhost:5000/api";
    let currentStatus = 'Pending';

    // Check authentication once using SessionManager
    if (!SessionManager.requireAuth()) {
        window.location.href = 'login.html';
        throw new Error('Authentication required');
    }

    // Get session data once
    const session = SessionManager.getCurrentSession();
    const { token, user } = session;

    // Verify doctor role
    if (user.role !== 'doctor') {
        window.location.href = 'login.html';
        throw new Error('Doctor access required');
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadAppointments('Pending');
        setupTabListeners();
        startAutoRefresh();
    });

    // Add auto-refresh functionality
    function startAutoRefresh() {
        setInterval(() => {
            loadAppointments(currentStatus);
        }, 10000); // Refresh every 10 seconds
    }

    function setupTabListeners() {
        document.querySelectorAll('#appointmentTabs .nav-link').forEach(tab => {
            tab.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('#appointmentTabs .nav-link').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentStatus = tab.dataset.status;
                loadAppointments(currentStatus);
            });
        });
    }

    async function loadAppointments(status) {
        try {
            const response = await fetch(`${API_URL}/appointments/status/${status}`, {
                headers: { "Authorization": `Bearer ${token}` }
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

            const data = await response.json();
            updateAppointmentCounts(data.counts);
            displayAppointments(data.appointments, status);
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('appointmentsContainer').innerHTML = `
                <div class="col-12">
                    <div class="alert alert-danger">
                        Error loading appointments. Please try again later.
                    </div>
                </div>`;
        }
    }

    function updateAppointmentCounts(counts) {
        Object.keys(counts).forEach(status => {
            document.getElementById(`${status.toLowerCase()}Count`).textContent = counts[status];
        });
    }

    function displayAppointments(appointments, status) {
        const container = document.getElementById('appointmentsContainer');
        
        if (!appointments.length) {
            container.innerHTML = `
                <div class="col-12">
                    <div class="alert alert-info">
                        No ${status.toLowerCase()} appointments found.
                    </div>
                </div>`;
            return;
        }

        container.innerHTML = appointments.map(apt => `
            <div class="col-md-4">
                <div class="card appointment-card status-${status.toLowerCase()}">
                    <div class="card-body">
                        <h5 class="card-title">
                            ${apt.patient_name}
                            <span class="badge bg-${getStatusColor(status)} float-end">${status}</span>
                        </h5>
                        <p class="card-text">
                            <i class="fas fa-calendar"></i> ${new Date(apt.date).toLocaleDateString()}<br>
                            <i class="fas fa-clock"></i> ${apt.time_slot}
                        </p>
                        <button class="btn btn-info btn-sm w-100 mb-2" onclick="viewPatientInfo('${apt.patient_id}')">
                            <i class="fas fa-user"></i> View Patient Info
                        </button>
                        ${getActionButtons(apt._id, status)}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function getStatusColor(status) {
        const colors = {
            Pending: 'warning',
            Confirmed: 'success',
            Completed: 'primary',
            Cancelled: 'danger'
        };
        return colors[status] || 'secondary';
    }

    function getActionButtons(id, status) {
        if (status === 'Pending') {
            return `
                <div class="btn-group w-100">
                    <button class="btn btn-success btn-sm" onclick="updateStatus('${id}', 'Confirmed')">
                        <i class="fas fa-check"></i> Confirm
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="updateStatus('${id}', 'Cancelled')">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                </div>`;
        }
        if (status === 'Confirmed') {
            return `
                <div class="btn-group w-100">
                    <button class="btn btn-primary btn-sm" onclick="updateStatus('${id}', 'Completed')">
                        <i class="fas fa-check-double"></i> Complete
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="updateStatus('${id}', 'Cancelled')">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                </div>`;
        }
        return '';
    }

    async function updateStatus(appointmentId, newStatus) {
        if (!confirm(`Are you sure you want to mark this appointment as ${newStatus}?`)) {
            return;
        }

        try {
            const response = await fetch(`${API_URL}/appointments/${appointmentId}/status`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ status: newStatus })
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            loadAppointments(currentStatus);
        } catch (error) {
            console.error('Error:', error);
            alert('Error updating appointment status');
        }
    }

    async function viewPatientInfo(patientId) {
        try {
            const response = await fetch(`${API_URL}/appointments/patient/${patientId}`, {
                headers: { 
                    "Authorization": `Bearer ${token}`
                }
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message || 'Failed to load patient information');
            }

            const data = await response.json();
            const patient = data.patient;
            
            // Calculate age from DOB
            const age = patient.dob ? Math.floor((new Date() - new Date(patient.dob)) / (365.25 * 24 * 60 * 60 * 1000)) : 'N/A';

            document.getElementById('patientInfo').innerHTML = `
                <div class="mb-3">
                    <strong><i class="fas fa-user"></i> Name:</strong> ${patient.name}
                </div>
                <div class="mb-3">
                    <strong><i class="fas fa-envelope"></i> Email:</strong> ${patient.email}
                </div>
                <div class="mb-3">
                    <strong><i class="fas fa-phone"></i> Phone:</strong> ${patient.phone}
                </div>
                <div class="mb-3">
                    <strong><i class="fas fa-birthday-cake"></i> Age:</strong> ${age} years
                </div>
                <div class="mb-3">
                    <strong><i class="fas fa-venus-mars"></i> Gender:</strong> ${patient.gender}
                </div>
                <div class="mb-3">
                    <strong><i class="fas fa-map-marker-alt"></i> Address:</strong> ${patient.address}
                </div>
            `;

            new bootstrap.Modal(document.getElementById('patientInfoModal')).show();
        } catch (error) {
            console.error('Error:', error);
            alert(error.message || 'Error loading patient information');
        }
    }

    function logout() {
        SessionManager.clearSession(session.userId);
        window.location.href = 'login.html';
    }
</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
