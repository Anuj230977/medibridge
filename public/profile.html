<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBridge - Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .profile-container {
            max-width: 800px;
            margin: 2rem auto;
        }

        .profile-header {
            background: linear-gradient(135deg, #0143a3, #0d6efd);
            color: white;
            padding: 2rem;
            border-radius: 15px 15px 0 0;
            margin-bottom: 1rem;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .form-label {
            font-weight: 500;
            color: #2d3748;
        }

        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }

        .btn-update {
            background: linear-gradient(135deg, #0143a3, #0d6efd);
            border: none;
            padding: 0.8rem 2rem;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .btn-update:hover {
            transform: translateY(-2px);
        }

        .password-section {
            border-top: 1px solid #e2e8f0;
            margin-top: 2rem;
            padding-top: 2rem;
        }
    </style>
</head>
<body>
    <!-- Same navbar as booking.html -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <!-- ...copy navbar from booking.html... -->
    </nav>

    <div class="container mt-5 pt-4">
        <div class="profile-container">
            <div class="profile-header">
                <h3><i class="fas fa-user-circle"></i> Profile Settings</h3>
                <p class="mb-0">Update your personal information and password</p>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <!-- Personal Information Form -->
                    <form id="profileForm" class="mb-4">
                        <h5 class="mb-3">Personal Information</h5>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" readonly>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="phone" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Date of Birth</label>
                                <input type="date" class="form-control" id="dob" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" id="address" rows="2" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-update">
                            <i class="fas fa-save"></i> Update Profile
                        </button>
                    </form>

                    <!-- Password Change Form -->
                    <div class="password-section">
                        <h5 class="mb-3">Change Password</h5>
                        <form id="passwordForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Current Password</label>
                                    <input type="password" class="form-control" id="currentPassword" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">New Password</label>
                                    <input type="password" class="form-control" id="newPassword" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Confirm New Password</label>
                                    <input type="password" class="form-control" id="confirmPassword" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-update">
                                <i class="fas fa-key"></i> Update Password
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/sessionManager.js"></script>
    <script>
        const API_URL = "http://localhost:5000/api";

        // Check authentication
        if (!SessionManager.requireAuth()) {
            window.location.href = 'login.html';
            throw new Error('Authentication required');
        }

        const session = SessionManager.getCurrentSession();
        const { token, user } = session;

        // Load user profile
        document.addEventListener('DOMContentLoaded', loadProfile);

        async function loadProfile() {
            try {
                const response = await fetch(`${API_URL}/auth/profile/${user._id}`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                const data = await response.json();

                if (data.success) {
                    document.getElementById('name').value = data.user.name;
                    document.getElementById('email').value = data.user.email;
                    document.getElementById('phone').value = data.user.phone;
                    document.getElementById('dob').value = data.user.dob?.split('T')[0];
                    document.getElementById('address').value = data.user.address;
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        // Update profile
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const updatedProfile = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                dob: document.getElementById('dob').value,
                address: document.getElementById('address').value
            };

            try {
                const response = await fetch(`${API_URL}/auth/profile/update/${user._id}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(updatedProfile)
                });

                const data = await response.json();
                if (data.success) {
                    alert('Profile updated successfully!');
                } else {
                    alert(data.message || 'Error updating profile');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error updating profile');
            }
        });

        // Update password
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                alert('New passwords do not match!');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/password/update/${user._id}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        currentPassword: document.getElementById('currentPassword').value,
                        newPassword
                    })
                });

                const data = await response.json();
                if (data.success) {
                    alert('Password updated successfully!');
                    document.getElementById('passwordForm').reset();
                } else {
                    alert(data.message || 'Error updating password');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error updating password');
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
