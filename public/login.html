<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediBridge - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --secondary: #64748b;
      --light-gray: #e2e8f0;
      --dark: #1e293b;
    }

    * {
      margin: 0px 0px 8px;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
      padding: 20px;
    }

    .auth-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      padding: 30px;
      width: 100%;
      max-width: 420px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .auth-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--primary);
    }

    .auth-title {
      margin-top: 12px;
      font-size: 1.4rem;
      color: var(--dark);
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: var(--dark);
    }

    .form-control, select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--light-gray);
      border-radius: 6px;
      font-size: 1rem;
    }

    .form-control:focus, select:focus {
      border-color: var(--primary);
      outline: none;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      transition: background 0.3s;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .auth-footer {
      text-align: center;
      margin-top: 15px;
      font-size: 1.2rem;
    }

    .auth-link {
      color: var(--primary);
      font-weight: 500;
      text-decoration: none;
    }

    .auth-link:hover {
      text-decoration: underline;
    }

    footer {
      background: #fff;
      text-align: center;
      padding: 15px;
      border-top: 1px solid var(--light-gray);
      font-size: 0.9rem;
      color: var(--secondary);
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fas fa-hospital"></i> MediBridge
        </div>
        <h2 class="auth-title">Sign in to your account</h2>
      </div>

      <form id="login-form">
        <div class="mb-3">
            <label for="role" class="form-label">Select Role</label>
            <select class="form-select" id="role" required>
                <option value="">-- Choose Role --</option>
                <option value="patient">Patient</option>
                <option value="doctor">Doctor</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
        </div>
        <div id="error-message" class="text-danger mb-3"></div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>

      <div class="auth-footer">
        <p>New Patient? <a href="Patient-Registration.html" class="auth-link">Register Here</a></p>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2025 MediBridge - Medical Appointment System</p>
  </footer>

  <script src="js/sessionManager.js"></script>
  <script>
    const API_URL = "http://localhost:5000/api";
    
    document.getElementById("login-form").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const role = document.getElementById("role").value;
        const errorElement = document.getElementById("error-message");
        
        try {
            console.log('Attempting login...', { email, role }); // Debug log
            
            const res = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, role })
            });

            const data = await res.json();
            console.log('Login response:', data); // Debug log

            if (!res.ok || !data.success) {
                throw new Error(data.message || 'Login failed');
            }

            // Store session using SessionManager
            SessionManager.setSession(data.user._id, data.token, data.user);

            // Redirect based on role
            if (role === 'doctor') {
                window.location.href = 'doctor-dashboard.html';
            } else {
                window.location.href = 'booking.html';
            }
        } catch (error) {
            console.error('Login error:', error); // Debug log
            errorElement.textContent = error.message;
            errorElement.style.color = 'red';
        }
    });
</script>

</body>
</html>
